<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <!-- node topology: 1 orchestrator (center) connected to 4 workers -->

  <!-- connection lines -->
  <line x1="22" y1="22" x2="6"  y2="6"  stroke="#ff5a4e" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="22" y1="22" x2="38" y2="6"  stroke="#ff5a4e" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="22" y1="22" x2="6"  y2="38" stroke="#ff5a4e" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="22" y1="22" x2="38" y2="38" stroke="#ff5a4e" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- worker nodes (corners) -->
  <rect x="2"  y="2"  width="8" height="8" rx="2" fill="none" stroke="#ff5a4e" stroke-width="1.5"/>
  <rect x="34" y="2"  width="8" height="8" rx="2" fill="none" stroke="#ff5a4e" stroke-width="1.5"/>
  <rect x="2"  y="34" width="8" height="8" rx="2" fill="none" stroke="#ff5a4e" stroke-width="1.5"/>
  <rect x="34" y="34" width="8" height="8" rx="2" fill="none" stroke="#ff5a4e" stroke-width="1.5"/>

  <!-- orchestrator node (center, filled) -->
  <rect x="14" y="14" width="16" height="16" rx="3" fill="#ff5a4e"/>
  <!-- inner cross to suggest coordination -->
  <line x1="22" y1="17" x2="22" y2="27" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="22" x2="27" y2="22" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="54" y="16" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="700" fill="#f5f5f5" letter-spacing="-0.2">Smech</text>
  <text x="54" y="32" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" fill="#b3b3b3" letter-spacing="0.5">FARM</text>
</svg>
